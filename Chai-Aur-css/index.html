<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chai UI Demo</title>
  </head>
  <body class="chaiBg-blue-100 chaiP-20">
    <!-- Navbar -->
    <div
      class="chaiFlex-direction-row chaiFlex-justify-between chaiFlex-align-center chaiBg-black chaiP-15 chaiMy-20"
    >
      <h1 class="chaiT-red-500 chaiFS-20">Chai UI</h1>
      <div>
        <span class="chaiT-red chaiMx-10">Home</span>
        <span class="chaiT-white chaiMx-10">About</span>
        <span class="chaiT-white chaiMx-10">Contact</span>
      </div>
    </div>

    <!-- Container -->
    <div class="chaiFlex-direction-row chaiFlex-gap-20 chaiFlex-justify-center">
      <!-- Card 1 -->
      <div
        class="chaiBg-white chaiP-20 chaiBR-10 chaiB-1 chaiMx-10"
        style="width: 250px"
      >
        <h2 class="chaiT-blue-500 chaiFS-20 chaiM-10">Profile</h2>
        <p class="chaiFA-left chaiFS-14 chaiM-10">
          Welcome to your dashboard. Manage your profile here.
        </p>
        <button class="chaiBg-blue chaiT-white chaiP-10 chaiBR-5">Edit</button>
      </div>

      <!-- Card 2 -->
      <div
        class="chaiBg-white chaiP-20 chaiBR-10 chaiB-1 chaiMx-10"
        style="width: 250px"
      >
        <h2 class="chaiT-green-500 chaiFS-20 chaiM-10">Tasks</h2>
        <p class="chaiFA-left chaiFS-14 chaiM-10">
          Track your daily tasks and productivity.
        </p>
        <button class="chaiBg-green chaiT-white chaiP-10 chaiBR-5">View</button>
      </div>

      <!-- Card 3 -->
      <div
        class="chaiBg-white chaiP-20 chaiBR-10 chaiB-1 chaiMx-10"
        style="width: 250px"
      >
        <h2 class="chaiT-red-500 chaiFS-20 chaiM-10">Settings</h2>
        <p class="chaiFA-left chaiFS-14 chaiM-10">
          Customize your preferences and account.
        </p>
        <button class="chaiBg-red chaiT-white chaiP-10 chaiBR-5">Open</button>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
